<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Right face (darkest) -->
  <polygon points="16,16 28,9 28,22 16,29" fill="#5aa8d0"/>
  <!-- Left face (mid) -->
  <polygon points="4,9 16,16 16,29 4,22" fill="#7ec0e0"/>
  <!-- Top face (lightest) -->
  <polygon points="16,2 28,9 16,16 4,9" fill="#b8e0f0"/>
  <!-- Shine on top face -->
  <polygon points="16,2 22,5.5 16,9 10,5.5" fill="white" fill-opacity="0.55"/>
  <!-- Edge lines -->
  <polyline points="4,9 16,2 28,9" fill="none" stroke="#4a90b8" stroke-width="0.5" stroke-opacity="0.5"/>
  <line x1="16" y1="16" x2="16" y2="29" stroke="#4a90b8" stroke-width="0.5" stroke-opacity="0.5"/>
  <line x1="4" y1="9" x2="4" y2="22" stroke="#4a90b8" stroke-width="0.5" stroke-opacity="0.5"/>
  <line x1="28" y1="9" x2="28" y2="22" stroke="#4a90b8" stroke-width="0.5" stroke-opacity="0.5"/>
  <polyline points="4,22 16,29 28,22" fill="none" stroke="#4a90b8" stroke-width="0.5" stroke-opacity="0.5"/>
</svg>
